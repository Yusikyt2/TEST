<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAX 2 Pro Messenger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --app-height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            height: 100vh;
            height: var(--app-height);
            overflow: hidden;
            touch-action: manipulation;
        }

        .view { display: none; height: 100%; }
        .view.active { display: flex; flex-direction: column; }

        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .message-bubble {
            max-width: 85%;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        .nav-btn.active { color: #3b82f6; position: relative; }
        .nav-btn.active::after {
            content: '';
            position: absolute;
            top: 0;
            left: 20%;
            right: 20%;
            height: 2px;
            background: #3b82f6;
        }

        #notification-toast {
            opacity: 0; 
            pointer-events: none; 
            transform: translateY(150%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }
        #notification-toast.show {
            opacity: 1; 
            pointer-events: auto;
            transform: translateY(0);
        }

        @media (max-width: 640px) {
            .message-bubble { max-width: 90%; }
            input, button { font-size: 16px !important; }
        }

        .avatar-circle {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #334155;
            flex-shrink: 0;
        }

        /* Стили для голосовых */
        .voice-message {
            display: flex;
            items-center: center;
            gap: 10px;
            min-width: 140px;
        }
        .record-active {
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <!-- Notification Toast -->
    <div id="notification-toast" class="fixed bottom-20 left-4 right-4 md:left-auto md:right-4 md:w-80 z-[60] bg-slate-800 border border-blue-500/50 p-4 rounded-2xl shadow-2xl flex items-center gap-3 cursor-pointer">
        <div id="notif-avatar" class="avatar-circle w-10 h-10 rounded-full border border-slate-600"></div>
        <div class="flex-1 overflow-hidden">
            <p id="notif-sender" class="text-xs font-bold text-blue-400 truncate"></p>
            <p id="notif-text" class="text-sm text-slate-200 truncate"></p>
        </div>
        <button id="close-notif" class="text-slate-500 hover:text-white">✕</button>
    </div>

    <!-- Auth Overlay -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950 px-4">
        <div class="bg-slate-900 border border-slate-800 p-6 md:p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center font-bold text-3xl shadow-lg">M2</div>
            </div>
            
            <div id="auth-mode-container">
                <h2 id="auth-title" class="text-2xl font-bold mb-6 text-center text-white">Вход в MAX 2</h2>
                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Email" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <input type="password" id="auth-password" placeholder="Пароль" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    <input type="text" id="auth-name" placeholder="Ваше Имя" class="hidden w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    
                    <button id="auth-submit" class="w-full bg-blue-600 hover:bg-blue-500 active:scale-95 text-white font-bold py-3 rounded-xl transition-all shadow-lg">Войти</button>
                    
                    <p class="text-center text-sm text-slate-400">
                        <span id="auth-toggle-text">Нет аккаунта?</span> 
                        <button id="auth-toggle-btn" class="text-blue-400 font-semibold ml-1 hover:underline">Создать</button>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App Structure -->
    <div id="app-container" class="flex flex-col h-screen max-w-2xl mx-auto border-x border-slate-800 bg-slate-950 shadow-2xl hidden">
        
        <!-- Header -->
        <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/90 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <div id="header-avatar" class="avatar-circle w-10 h-10 rounded-full border border-slate-700"></div>
                <div>
                    <h1 id="view-title" class="font-semibold text-base md:text-lg leading-tight">Общий чат</h1>
                    <div class="flex items-center gap-1.5">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <p id="user-status" class="text-[10px] text-green-400 font-mono tracking-tighter">ONLINE</p>
                    </div>
                </div>
            </div>
            <button id="logout-btn" class="p-2 text-slate-500 hover:text-red-400 transition-colors active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </header>

        <!-- Views Container -->
        <div class="flex-1 overflow-hidden relative bg-slate-900">
            
            <!-- 1. Global Chat View -->
            <section id="view-global" class="view active">
                <div id="global-messages" class="chat-container p-4 space-y-4"></div>
                
                <!-- Recording UI (Hidden by default) -->
                <div id="global-record-ui" class="hidden px-4 py-2 bg-slate-900 border-t border-slate-800 flex items-center justify-between">
                    <div class="flex items-center gap-3 text-red-500">
                        <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></div>
                        <span id="global-record-timer" class="text-sm font-mono">00:00</span>
                    </div>
                    <div class="flex gap-2">
                        <button id="cancel-global-record" class="text-slate-400 text-xs font-bold uppercase p-2">Отмена</button>
                        <button id="stop-global-record" class="bg-red-600 p-2 rounded-full text-white shadow-lg shadow-red-900/40">
                             <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                        </button>
                    </div>
                </div>

                <form class="p-3 md:p-4 border-t border-slate-800 flex gap-2 bg-slate-900 chat-input-form">
                    <input type="text" placeholder="Сообщение..." class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white outline-none focus:ring-1 focus:ring-blue-500">
                    <div class="flex gap-1.5">
                        <button type="button" class="voice-start-btn bg-slate-800 text-slate-400 hover:text-blue-400 p-3 rounded-xl active:scale-90 transition-all border border-slate-700">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </button>
                        <button type="submit" class="bg-blue-600 hover:bg-blue-500 p-3 rounded-xl text-white active:scale-90 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                </form>
            </section>

            <!-- 2. Contacts View -->
            <section id="view-contacts" class="view">
                <div class="p-4 border-b border-slate-800 bg-slate-900/50">
                    <h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.2em]">Пользователи в сети</h3>
                </div>
                <div id="contacts-list" class="flex-1 overflow-y-auto p-2 space-y-1.5"></div>
            </section>

            <!-- 3. Private Chat View -->
            <section id="view-private-chat" class="view">
                <div class="p-2 border-b border-slate-800 bg-slate-800/40 flex items-center">
                    <button onclick="switchView('contacts')" class="flex items-center gap-1 p-2 text-blue-400 hover:text-blue-300 text-sm font-medium">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                        Назад
                    </button>
                    <div class="flex items-center gap-2 ml-2">
                        <div id="private-partner-avatar" class="avatar-circle w-7 h-7 rounded-full border border-slate-600"></div>
                        <span id="private-chat-partner" class="font-bold text-sm text-white">...</span>
                    </div>
                </div>
                <div id="private-messages" class="chat-container p-4 space-y-4"></div>

                <!-- Private Record UI -->
                <div id="private-record-ui" class="hidden px-4 py-2 bg-slate-900 border-t border-slate-800 flex items-center justify-between">
                    <div class="flex items-center gap-3 text-indigo-500">
                        <div class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></div>
                        <span id="private-record-timer" class="text-sm font-mono">00:00</span>
                    </div>
                    <div class="flex gap-2">
                        <button id="cancel-private-record" class="text-slate-400 text-xs font-bold uppercase p-2">Отмена</button>
                        <button id="stop-private-record" class="bg-indigo-600 p-2 rounded-full text-white shadow-lg shadow-indigo-900/40">
                             <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                        </button>
                    </div>
                </div>

                <form class="p-3 md:p-4 border-t border-slate-800 flex gap-2 bg-slate-900 chat-input-form">
                    <input type="text" placeholder="Личное сообщение..." class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-2.5 text-sm text-white outline-none focus:ring-1 focus:ring-indigo-500">
                    <div class="flex gap-1.5">
                        <button type="button" class="voice-start-btn bg-slate-800 text-slate-400 hover:text-indigo-400 p-3 rounded-xl active:scale-90 transition-all border border-slate-700">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                        </button>
                        <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 p-3 rounded-xl text-white active:scale-90 transition-transform">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                        </button>
                    </div>
                </form>
            </section>

            <!-- 4. Profile View -->
            <section id="view-profile" class="view">
                <div class="p-6 space-y-8 overflow-y-auto">
                    <div class="flex flex-col items-center">
                        <div id="profile-avatar-display" class="avatar-circle w-28 h-28 rounded-full border-4 border-slate-800 bg-slate-700 mb-4 relative group overflow-hidden">
                            <label for="avatar-upload" class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center rounded-full cursor-pointer transition-opacity text-xs font-bold text-white uppercase tracking-tighter text-center px-2">
                                Нажмите для смены
                            </label>
                            <input type="file" id="avatar-upload" class="hidden" accept="image/*">
                        </div>
                        <p id="profile-uid" class="text-xs font-mono text-blue-400 bg-blue-900/20 px-4 py-2 rounded-xl border border-blue-500/20 font-bold tracking-widest"></p>
                    </div>

                    <div class="space-y-6 max-w-sm mx-auto w-full">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-400 ml-1">ОТОБРАЖАЕМОЕ ИМЯ</label>
                            <div class="flex gap-2">
                                <input type="text" id="profile-name-input" class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500 transition-all text-white">
                                <button id="save-profile-btn" class="bg-blue-600 hover:bg-blue-500 px-4 rounded-xl font-bold text-sm active:scale-95 transition-transform">ОК</button>
                            </div>
                        </div>
                        <div class="pt-6 border-t border-slate-800 space-y-4">
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-slate-400 ml-1 text-red-400">СМЕНА ПАРОЛЯ</label>
                                <input type="password" id="profile-pass-input" placeholder="Новый пароль" class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-red-500 transition-all text-white text-sm">
                            </div>
                            <button id="save-pass-btn" class="w-full bg-slate-800 border border-slate-700 hover:bg-slate-700 py-3 rounded-xl font-bold text-sm text-slate-300 transition-colors">Обновить пароль</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Footer Navigation -->
        <nav class="flex border-t border-slate-800 bg-slate-900/95 backdrop-blur-md pb-safe">
            <button onclick="switchView('global')" class="nav-btn flex-1 py-4 flex flex-col items-center gap-1 active transition-colors" id="nav-global">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="text-[10px] font-medium">Чат</span>
            </button>
            <button onclick="switchView('contacts')" class="nav-btn flex-1 py-4 flex flex-col items-center gap-1 transition-colors" id="nav-contacts">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <span class="text-[10px] font-medium">ЛС</span>
            </button>
            <button onclick="switchView('profile')" class="nav-btn flex-1 py-4 flex flex-col items-center gap-1 transition-colors" id="nav-profile">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span class="text-[10px] font-medium">Профиль</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
            signOut, onAuthStateChanged, updatePassword 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, doc, setDoc, getDoc, updateDoc, collection, 
            addDoc, onSnapshot, serverTimestamp, query, where, or 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCFXk-lrKxyXlVC0NpSl1IIfG3dOOWlGJI",
            authDomain: "max-2-d595f.firebaseapp.com",
            projectId: "max-2-d595f",
            storageBucket: "max-2-d595f.firebasestorage.app",
            messagingSenderId: "198424406783",
            appId: "1:198424406783:web:4c3a5fdac7d7b229c43aca",
            measurementId: "G-8C6VMDV4HP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = firebaseConfig.projectId;

        let currentUser = null;
        let userData = null;
        let activePrivatePartner = null;
        let isRegistration = false;
        let currentView = 'global';
        let initialLoadDone = false;

        // Recording State
        let mediaRecorder = null;
        let audioChunks = [];
        let recordTimerInterval = null;
        let recordSeconds = 0;

        const generateNumericId = (uid) => {
            if (!uid) return '0000000000';
            let hash = 0;
            for (let i = 0; i < uid.length; i++) {
                const char = uid.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = Math.abs(hash);
            }
            return hash.toString().slice(0, 10).padStart(10, '0');
        };

        const resetHeight = () => {
            document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
        };
        window.addEventListener('resize', resetHeight);
        resetHeight();

        const authScreen = document.getElementById('auth-screen');
        const authSubmit = document.getElementById('auth-submit');
        const authToggle = document.getElementById('auth-toggle-btn');
        const authNameInput = document.getElementById('auth-name');

        authToggle.onclick = () => {
            isRegistration = !isRegistration;
            document.getElementById('auth-title').innerText = isRegistration ? 'Регистрация' : 'Вход в MAX 2';
            authSubmit.innerText = isRegistration ? 'Создать аккаунт' : 'Войти';
            document.getElementById('auth-toggle-text').innerText = isRegistration ? 'Уже есть аккаунт?' : 'Нет аккаунта?';
            authToggle.innerText = isRegistration ? 'Войти' : 'Создать';
            authNameInput.classList.toggle('hidden', !isRegistration);
        };

        authSubmit.onclick = async () => {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-password').value.trim();
            const name = authNameInput.value.trim();
            if (!email || !pass) return alert("Заполните поля!");
            try {
                if (isRegistration) {
                    if (!name) return alert("Введите имя!");
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, 'artifacts', appId, 'users', cred.user.uid), {
                        uid: cred.user.uid,
                        displayName: name,
                        email: email,
                        avatar: '',
                        lastSeen: serverTimestamp()
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (e) { alert("Ошибка: " + e.message); }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                currentUser = u;
                authScreen.classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                onSnapshot(doc(db, 'artifacts', appId, 'users', u.uid), (doc) => {
                    userData = doc.data();
                    updateUIProfile();
                });
                setupGlobalChat();
                setupContacts();
                setupNotifications();
            } else {
                document.getElementById('app-container').classList.add('hidden');
                authScreen.classList.remove('hidden');
            }
        });

        window.switchView = (viewName) => {
            currentView = viewName;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const target = document.getElementById('view-' + viewName);
            if (target) target.classList.add('active');
            const navBtn = document.getElementById('nav-' + viewName);
            if (navBtn) navBtn.classList.add('active');
            const titles = { global: 'Общий чат', contacts: 'Сообщения', profile: 'Ваш профиль', 'private-chat': 'Личная переписка' };
            document.getElementById('view-title').innerText = titles[viewName] || 'MAX 2';
            if (viewName === 'global') {
                const cont = document.getElementById('global-messages');
                cont.scrollTop = cont.scrollHeight;
            }
        };

        function updateUIProfile() {
            if (!userData) return;
            const avatars = document.querySelectorAll('#header-avatar, #profile-avatar-display');
            const avatarUrl = userData.avatar || '';
            avatars.forEach(el => {
                if (avatarUrl) {
                    el.style.backgroundImage = `url("${avatarUrl}")`;
                    el.classList.remove('bg-slate-700');
                } else {
                    el.style.backgroundImage = 'none';
                    el.classList.add('bg-slate-700');
                }
            });
            document.getElementById('profile-name-input').value = userData.displayName || '';
            document.getElementById('profile-uid').innerText = "ID: " + generateNumericId(userData.uid);
        }

        // Voice Recording Logic
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                
                const isGlobal = currentView === 'global';
                const recordUI = document.getElementById(isGlobal ? 'global-record-ui' : 'private-record-ui');
                const timerDisplay = document.getElementById(isGlobal ? 'global-record-timer' : 'private-record-timer');
                const form = recordUI.nextElementSibling;
                
                recordUI.classList.remove('hidden');
                form.classList.add('hidden');
                
                recordSeconds = 0;
                timerDisplay.innerText = "00:00";
                recordTimerInterval = setInterval(() => {
                    recordSeconds++;
                    const m = Math.floor(recordSeconds / 60).toString().padStart(2, '0');
                    const s = (recordSeconds % 60).toString().padStart(2, '0');
                    timerDisplay.innerText = `${m}:${s}`;
                }, 1000);

                mediaRecorder.onstop = async () => {
                    clearInterval(recordTimerInterval);
                    recordUI.classList.add('hidden');
                    form.classList.remove('hidden');
                    
                    if (audioChunks.length === 0) return;
                    
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (audioBlob.size < 1000) return; // Too short

                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = async () => {
                        const base64Audio = reader.result;
                        await sendVoiceMessage(base64Audio);
                    };
                    
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
            } catch (err) {
                alert("Микрофон недоступен: " + err.message);
            }
        }

        async function sendVoiceMessage(base64) {
            const isGlobal = currentView === 'global';
            const path = isGlobal ? 'messages' : 'direct_messages';
            const payload = {
                audio: base64,
                createdAt: serverTimestamp(),
                senderName: userData.displayName,
                senderId: currentUser.uid
            };
            if (!isGlobal) {
                payload.from = currentUser.uid;
                payload.to = activePrivatePartner.uid;
            }
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', path), payload);
            } catch(e) { console.error(e); }
        }

        document.querySelectorAll('.voice-start-btn').forEach(btn => {
            btn.onclick = () => startRecording();
        });

        ['global', 'private'].forEach(type => {
            document.getElementById(`stop-${type}-record`).onclick = () => mediaRecorder && mediaRecorder.stop();
            document.getElementById(`cancel-${type}-record`).onclick = () => {
                audioChunks = [];
                mediaRecorder && mediaRecorder.stop();
            };
        });

        function setupGlobalChat() {
            const ref = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
            onSnapshot(ref, (snap) => {
                const msgs = [];
                snap.forEach(d => msgs.push({id: d.id, ...d.data()}));
                msgs.sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                renderMessages('global-messages', msgs);
            });
        }

        function setupContacts() {
            const usersRef = collection(db, 'artifacts', appId, 'users');
            onSnapshot(usersRef, (snap) => {
                const list = document.getElementById('contacts-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const u = d.data();
                    if (u.uid === currentUser.uid) return;
                    const item = document.createElement('div');
                    item.className = "flex items-center gap-3 p-3 bg-slate-800/20 rounded-xl hover:bg-slate-800/60 active:scale-[0.98] transition-all cursor-pointer border border-slate-800/50";
                    item.innerHTML = `
                        <div class="avatar-circle w-11 h-11 rounded-full border border-slate-700" style="background-image: ${u.avatar ? `url("${u.avatar}")` : 'none'}"></div>
                        <div class="flex-1 overflow-hidden">
                            <h4 class="font-bold text-sm text-white truncate">${escape(u.displayName)}</h4>
                            <p class="text-[9px] text-blue-400/60 font-mono font-bold tracking-widest uppercase">ID: ${generateNumericId(u.uid)}</p>
                        </div>
                    `;
                    item.onclick = () => openPrivateChat(u);
                    list.appendChild(item);
                });
            });
        }

        function setupNotifications() {
            const ref = collection(db, 'artifacts', appId, 'public', 'data', 'direct_messages');
            onSnapshot(ref, (snap) => {
                if (!initialLoadDone) { initialLoadDone = true; return; }
                snap.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const msg = change.doc.data();
                        if (msg.to === currentUser.uid && (currentView !== 'private-chat' || activePrivatePartner?.uid !== msg.from)) {
                            showNotification(msg);
                        }
                    }
                });
            });
        }

        async function showNotification(msg) {
            const senderDoc = await getDoc(doc(db, 'artifacts', appId, 'users', msg.from));
            const senderData = senderDoc.data();
            const toast = document.getElementById('notification-toast');
            const notifAvatar = document.getElementById('notif-avatar');
            const notifSender = document.getElementById('notif-sender');
            const notifText = document.getElementById('notif-text');
            if (senderData?.avatar) notifAvatar.style.backgroundImage = `url("${senderData.avatar}")`;
            else notifAvatar.style.backgroundImage = 'none';
            notifSender.innerText = senderData?.displayName || 'Новое сообщение';
            notifText.innerText = msg.audio ? "🎤 Голосовое сообщение" : msg.text;
            toast.classList.add('show');
            toast.onclick = () => {
                if (senderData) openPrivateChat(senderData);
                toast.classList.remove('show');
            };
            document.getElementById('close-notif').onclick = (e) => {
                e.stopPropagation();
                toast.classList.remove('show');
            };
            setTimeout(() => toast.classList.remove('show'), 5000);
        }

        async function openPrivateChat(partner) {
            activePrivatePartner = partner;
            document.getElementById('private-chat-partner').innerText = partner.displayName;
            const pAvatar = document.getElementById('private-partner-avatar');
            if(partner.avatar) pAvatar.style.backgroundImage = `url("${partner.avatar}")`;
            else pAvatar.style.backgroundImage = 'none';
            switchView('private-chat');
            const ref = collection(db, 'artifacts', appId, 'public', 'data', 'direct_messages');
            onSnapshot(ref, (snap) => {
                const msgs = [];
                snap.forEach(d => {
                    const m = d.data();
                    if ((m.from === currentUser.uid && m.to === partner.uid) || 
                        (m.from === partner.uid && m.to === currentUser.uid)) {
                        msgs.push({id: d.id, ...m});
                    }
                });
                msgs.sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
                renderMessages('private-messages', msgs);
            });
        }

        function renderMessages(containerId, msgs) {
            const container = document.getElementById(containerId);
            const isAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
            container.innerHTML = '';
            msgs.forEach(m => {
                const isMe = m.senderId === currentUser.uid || m.from === currentUser.uid;
                const div = document.createElement('div');
                div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-1`;
                const senderIdDisplay = isMe ? '' : `ID: ${generateNumericId(m.senderId || m.from)}`;

                let content = '';
                if (m.audio) {
                    content = `
                        <div class="voice-message py-1">
                            <button onclick="playVoice(this, '${m.audio}')" class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center hover:bg-white/30 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/></svg>
                            </button>
                            <span class="text-[10px] opacity-70 italic tracking-tighter">Голосовое • 🔊 〰️</span>
                        </div>
                    `;
                } else {
                    content = `<div class="leading-relaxed">${escape(m.text)}</div>`;
                }

                div.innerHTML = `
                    <div class="message-bubble px-4 py-2.5 rounded-2xl text-[13.5px] ${
                        isMe ? 'bg-blue-600 text-white rounded-tr-none shadow-lg shadow-blue-900/20' : 'bg-slate-800 text-slate-100 rounded-tl-none border border-slate-700/50'
                    }">
                        ${!isMe ? `
                            <div class="flex justify-between items-center gap-4 mb-1">
                                <span class="text-[10px] font-bold text-blue-400">${escape(m.senderName || 'Пользователь')}</span>
                                <span class="text-[8px] font-mono font-bold text-slate-500">${senderIdDisplay}</span>
                            </div>` : ''}
                        ${content}
                    </div>
                `;
                container.appendChild(div);
            });
            if (isAtBottom) container.scrollTop = container.scrollHeight;
        }

        window.playVoice = (btn, base64) => {
            const audio = new Audio(base64);
            const icon = btn.innerHTML;
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 3.5A.5.5 0 0 1 6 4v8a.5.5 0 0 1-1 0V4a.5.5 0 0 1 .5-.5zm5 0a.5.5 0 0 1 .5.5v8a.5.5 0 0 1-1 0V4a.5.5 0 0 1 .5-.5z"/></svg>`;
            audio.play();
            audio.onended = () => btn.innerHTML = icon;
        };

        document.querySelectorAll('.chat-input-form').forEach(form => {
            form.onsubmit = async (e) => {
                e.preventDefault();
                const input = form.querySelector('input');
                const text = input.value.trim();
                if (!text || !currentUser) return;
                input.value = '';
                const isGlobal = form.closest('#view-global');
                const path = isGlobal ? 'messages' : 'direct_messages';
                const payload = {
                    text,
                    createdAt: serverTimestamp(),
                    senderName: userData.displayName,
                    senderId: currentUser.uid
                };
                if (!isGlobal) {
                    payload.from = currentUser.uid;
                    payload.to = activePrivatePartner.uid;
                }
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', path), payload);
                } catch(e) { console.error(e); }
            };
        });

        document.getElementById('save-profile-btn').onclick = async () => {
            const btn = document.getElementById('save-profile-btn');
            const newName = document.getElementById('profile-name-input').value.trim();
            if (!newName) return;
            btn.disabled = true; btn.innerText = "...";
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid), { displayName: newName });
                setTimeout(() => { btn.disabled = false; btn.innerText = "ОК"; }, 500);
            } catch(e) { alert(e.message); btn.disabled = false; }
        };

        document.getElementById('save-pass-btn').onclick = async () => {
            const newPass = document.getElementById('profile-pass-input').value.trim();
            if (newPass.length < 6) return alert("Пароль слишком короткий (мин. 6 символов)");
            try {
                await updatePassword(currentUser, newPass);
                alert("Пароль успешно изменен!");
                document.getElementById('profile-pass-input').value = '';
            } catch (e) { alert("Ошибка: " + e.message); }
        };

        document.getElementById('avatar-upload').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 512000) return alert("Файл слишком большой (макс 500 КБ)");
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid), { avatar: base64 });
                } catch(e) { alert(e.message); }
            };
            reader.readAsDataURL(file);
        };

        function escape(s) {
            let d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    </script>
</body>
</html>
